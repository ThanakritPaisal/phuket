# Static server for the self-contained LOMA prototype.
# The HTML embeds all data + base64 images inline, so only this one file is served.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # The page is a single ~4 MB HTML file (real provider data inlined) — gzip is
    # what keeps the transfer small (~10x). nginx always gzips text/html when on.
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Don't let browsers cache a stale build of the prototype.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /LOMA.html  { add_header Cache-Control "no-cache"; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
