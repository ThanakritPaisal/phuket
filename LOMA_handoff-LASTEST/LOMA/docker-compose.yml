# Run the LOMA prototype (real data) locally:
#   docker compose up --build
# then open http://localhost:8080
services:
  loma-web:
    build: .
    image: loma-prototype-web
    container_name: loma-prototype
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
