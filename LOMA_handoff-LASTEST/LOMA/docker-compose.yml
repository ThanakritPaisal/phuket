# Run the LOMA prototype (real data) locally:
#   docker compose up --build
# then open http://localhost:8080
services:
  loma-web:
    build: .
    image: loma-prototype-web
    container_name: loma-prototype
    # The image defaults to PORT=8080 (for Cloud Run); locally we want nginx on 80
    # to match the "8080:80" mapping and the wget healthcheck below.
    environment:
      - PORT=80
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
